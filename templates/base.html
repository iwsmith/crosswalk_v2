<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crosswalk V2 Control Panel</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 16px;
            max-width: 900px;
            margin-inline: auto;
            font-size: 16px;
        }

        h1 { font-size: 1.4rem; }
        h3 { font-size: 1.1rem; }
        h4 { font-size: 1rem; }

        ul.compact-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        ul.compact-list > li {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            padding: 4px;
            margin: 2px 0;
        }

        /* Touch-friendly tap targets everywhere, not just compact-list */
        button {
            padding: 10px 14px;
            min-height: 44px;
            font-size: 0.95rem;
            line-height: 1;
            border: 1px solid #ccc;
            background: #f8f8f8;
            border-radius: 6px;
            cursor: pointer;
        }

        ul.compact-list button {
            padding: 8px 10px;
            min-height: 40px;
            font-size: 0.9rem;
        }

        button:hover { background: #e0e0e0; }
        button:active { background: #d5d5d5; }

        #status { background: #f0f0f0; padding: 16px; margin: 16px 0; border-radius: 8px; }
        .button-group { margin: 16px 0; }
        .button-group button { margin: 4px 4px 4px 0; }

        .noscript-warning {
            background: #b00020;
            color: #fff;
            padding: 12px 16px;
            margin: 0 0 16px 0;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }

        ul { padding-left: 1.2em; }

        @media (min-width: 640px) {
            body { padding: 40px; font-size: inherit; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <noscript>
        <div class="noscript-warning">
            ⚠️ JavaScript is disabled or not loading. This control panel needs it to
            refresh status and send commands — buttons will not work until it is enabled.
        </div>
    </noscript>
    <div id="js-load-warning" class="noscript-warning" style="display:none">
        ⚠️ The control panel script (htmx) failed to load, so buttons and status
        updates will not work. Check that /static/htmx.min.js is being served.
    </div>
    {% block content %}{% endblock %}
    <script>
        // htmx.min.js is loaded synchronously in <head>, so by the time this
        // runs it is either present or failed. If it failed (e.g. the local
        // static file isn't being served), surface a warning. No external deps.
        if (!window.htmx) {
            document.getElementById('js-load-warning').style.display = 'block';
        }
    </script>
</body>
</html>
