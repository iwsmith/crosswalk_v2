{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    <h1>🚦 Crosswalk V2 Control Panel</h1>
    
    <div id="alert-area"></div>
    
    <div class="button-group">
        <h3>Actions</h3>
        <button type="button" 
            hx-get="/status" 
            hx-target="#status" 
            hx-swap="innerHTML"
            >📊 Refresh Status</button>

        <button 
            hx-post="/button" 
            hx-target="#status" 
            hx-swap="innerHTML"
        >🔘 Press Button</button>

        <button 
            hx-post="/timer" 
            hx-target="#status" 
            hx-swap="innerHTML"
        >⏰ Timer Expired</button>

        <button 
            hx-post="/queue/_" 
            hx-target="#status" 
            hx-swap="innerHTML"
            hx-confirm="This will queue all walks. Are you sure?"
        >➕ Queue All</button>

        <button
            hx-delete="/queue/"
            hx-target="#status"
            hx-swap="innerHTML"
        >❌ Clear Queue</button>

        <button
            hx-post="/clock"
            hx-vals='js:{epoch_ms: Date.now()}'
            hx-target="#status"
            hx-swap="innerHTML"
            hx-confirm="Set the crosswalk system clock to this device's current time?"
        >🕐 Set Clock to My Time</button>
    </div>

    <div class="button-group">
        <h3>System Control</h3>
        <button
            hx-post="/restart/all"
            hx-target="#status"
            hx-swap="innerHTML"
            hx-confirm="Restart all crosswalk components on ALL boxes?"
        >♻️ Restart All Components (all boxes)</button>

        <button
            hx-post="/reboot/all"
            hx-target="#status"
            hx-swap="innerHTML"
            hx-confirm="Reboot ALL crosswalk boxes now?"
        >🔁 Reboot All Boxes</button>

        {% for host in hosts %}
        <div style="margin-top: 8px;">
            <strong>{{ host }}</strong>
            <button
                hx-post="/restart/{{ host }}/all"
                hx-target="#status"
                hx-swap="innerHTML"
                hx-confirm="Restart all components on {{ host }}?"
            >♻️ Restart components</button>
            <button
                hx-post="/reboot/{{ host }}"
                hx-target="#status"
                hx-swap="innerHTML"
                hx-confirm="Reboot {{ host }} now?"
            >🔁 Reboot</button>
        </div>
        {% endfor %}
    </div>

    <div id="status">
    {% include "components/status.html" %}
    </div>
{% endblock %}
