---
# Keep the signs' clocks in agreement. Raspberry Pis have no RTC, and on the
# isolated crosswalk AP network there is no internet NTP, so without this the two
# boxes drift apart. crosswalk-a serves time to the local network (from its own
# clock if there is no upstream), and the other signs sync from it.

- name: Install chrony
  become: yes
  apt:
    name: chrony
    state: present
    update_cache: yes
  tags:
    - packages

- name: Configure chrony as the local time server (access point host)
  become: yes
  copy:
    dest: /etc/chrony/conf.d/crosswalk.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Serve time to the local crosswalk network.
      allow
      # Provide time from the local clock even with no upstream source, so the
      # other signs can still synchronise on the isolated AP network.
      local stratum 10
  when: "'access_point' in group_names"
  notify: Restart chrony

- name: Configure chrony to sync from the crosswalk time server (client signs)
  become: yes
  copy:
    dest: /etc/chrony/conf.d/crosswalk.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Prefer crosswalk-a so every sign shares one clock, even offline.
      server crosswalk-a.local iburst prefer
  when: "'access_point' not in group_names"
  notify: Restart chrony

- name: Ensure chrony is enabled and running
  become: yes
  systemd:
    name: chrony
    enabled: yes
    state: started

# Clock-setting moved into crosswalk-ctl (see control.yml); remove the old
# standalone helper and its sudoers rule from previously-provisioned boxes.
- name: Remove obsolete standalone set-clock helper
  become: yes
  file:
    path: /usr/local/bin/set-crosswalk-clock
    state: absent

- name: Remove obsolete set-clock sudoers rule
  become: yes
  file:
    path: /etc/sudoers.d/crosswalk-clock
    state: absent

# --- Hardware RTC (DS1307) ---------------------------------------------------
# The signs have a DS1307 RTC add-on. Enabling it (so /dev/rtc0 exists), dropping
# the software fake clock, and letting chrony keep the RTC updated means the
# boxes hold correct time across reboots even with no internet.

- name: Enable I2C and the DS1307 RTC device-tree overlay
  become: yes
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    line: "{{ item }}"
    state: present
  loop:
    - "dtparam=i2c_arm=on"
    - "dtoverlay=i2c-rtc,ds1307"
  notify: Reboot pi

- name: Remove fake-hwclock (conflicts with a real RTC)
  become: yes
  apt:
    name: fake-hwclock
    state: absent
    purge: yes

- name: Enable chrony RTC synchronisation
  become: yes
  copy:
    dest: /etc/chrony/conf.d/rtc.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Keep the hardware RTC in step with the system clock.
      rtcsync
  notify: Restart chrony
