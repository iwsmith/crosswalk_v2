---
- name: Set Wi-Fi networks list
  set_fact:
    wifi_networks:
      - ssid: "crosswalk"
        password: "{{ crosswalk_wifi_password }}"
        priority: 1
      - ssid: "corginia_art"
        password: "{{ corginia_wifi_password }}"
        priority: 5
  when: "'access_point' not in group_names"

- name: Ensure NetworkManager is installed
  apt:
    name: network-manager
    state: present
    update_cache: yes
  when: "'access_point' not in group_names"
  tags:
    - packages

- name: Add Wi-Fi connections
  nmcli:
    conn_name: "{{ item.ssid }}"
    type: wifi
    ifname: wlan0
    ssid: "{{ item.ssid }}"
    wifi_sec:
      key-mgmt: wpa-psk
      psk: "{{ item.password }}"
    state: present
    autoconnect: yes
  loop: "{{ wifi_networks }}"
  when: "'access_point' not in group_names"

- name: Set Wi-Fi autoconnect priority
  # The nmcli module's `priority` only sets bridge-STP priority, so set the real
  # connection.autoconnect-priority here (higher wins → prefer corginia_art).
  command: >-
    nmcli connection modify "{{ item.ssid }}"
    connection.autoconnect-priority {{ item.priority }}
  loop: "{{ wifi_networks }}"
  when: "'access_point' not in group_names"
  changed_when: false

- name: Remove stale corginia_slow connection profile (renamed to corginia_art)
  when: "'access_point' not in group_names"
  file:
    path: /etc/NetworkManager/system-connections/corginia_slow.nmconnection
    state: absent
  register: stale_corginia_slow_profile

- name: Reload NetworkManager connections after removing stale profile
  when: "'access_point' not in group_names and stale_corginia_slow_profile.changed"
  command: nmcli connection reload
