---
- name: Ensure NetworkManager and dnsmasq are installed (AP needs shared mode)
  when: "'access_point' in group_names"
  apt:
    name:
      - network-manager
      - dnsmasq-base
    state: present
    update_cache: yes
  tags:
    - packages

# Create the primary client connection with the nmcli module (same mechanism
# crosswalk-b uses). Hand-writing the keyfile stored the PSK in a way
# NetworkManager rejected ("Secrets were required, but not provided"); letting
# nmcli manage it stores the secret correctly.
- name: Create primary Wi-Fi client connection (corginia_art)
  when: "'access_point' in group_names"
  community.general.nmcli:
    conn_name: corginia_art
    type: wifi
    ifname: wlan0
    ssid: corginia_art
    wifi_sec:
      key-mgmt: wpa-psk
      psk: "{{ corginia_wifi_password }}"
    autoconnect: true
    method4: auto
    method6: ignore
    state: present

- name: Remove stale corginia connection profile (renamed to corginia_slow)
  when: "'access_point' in group_names"
  file:
    path: /etc/NetworkManager/system-connections/corginia.nmconnection
    state: absent
  register: stale_corginia_profile

- name: Remove stale corginia_slow connection profile (renamed to corginia_art)
  when: "'access_point' in group_names"
  file:
    path: /etc/NetworkManager/system-connections/corginia_slow.nmconnection
    state: absent
  register: stale_corginia_slow_profile

- name: Reload NetworkManager connections after removing stale profiles
  when: >-
    'access_point' in group_names and
    (stale_corginia_profile.changed or stale_corginia_slow_profile.changed)
  command: nmcli connection reload

# Same story for the fallback AP: let nmcli store the PSK and the AP/shared
# settings so the secret is accepted and the AP actually starts.
- name: Create fallback AP connection (crosswalk, not autoconnect)
  when: "'access_point' in group_names"
  community.general.nmcli:
    conn_name: crosswalk
    type: wifi
    ifname: wlan0
    ssid: crosswalk
    wifi:
      mode: ap
      band: bg
      channel: "{{ crosswalk_ap_channel }}"
    wifi_sec:
      key-mgmt: wpa-psk
      psk: "{{ crosswalk_wifi_password }}"
    autoconnect: false
    method4: shared
    method6: ignore
    state: present

- name: Create fallback check script
  when: "'access_point' in group_names"
  copy:
    dest: /usr/local/bin/check_wifi_fallback.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # Run once at boot (wifi-fallback.service): try the primary client
      # connection, and if it doesn't come up, host the crosswalk AP instead
      # for the rest of this boot.
      #
      # Deliberately boot-only, with no periodic retry: a single radio is
      # EITHER a client OR an AP, not both, and it generally can't scan for
      # the primary while already acting as an AP. Rejoining the primary once
      # it's back in range is a manual `nmcli con up id corginia_art` (or a
      # reboot), not something this script chases automatically.
      set -u

      PRIMARY_SSID="corginia_art"
      PRIMARY_CONN="corginia_art"
      FALLBACK_CONN="crosswalk"
      RETRIES=4        # association attempts before giving up and starting the AP
      RETRY_DELAY=5    # seconds between attempts

      current_ssid() {
        nmcli -t -f active,ssid dev wifi | awk -F: '$1=="yes"{print $2; exit}'
      }

      # Already on the primary network: nothing to do.
      if [ "$(current_ssid)" = "$PRIMARY_SSID" ]; then
        echo "Connected to primary SSID ($PRIMARY_SSID), no action needed."
        exit 0
      fi

      for i in $(seq 1 "$RETRIES"); do
        echo "Attempt $i/$RETRIES to bring up $PRIMARY_CONN..."
        nmcli con up id "$PRIMARY_CONN" && sleep 2
        if [ "$(current_ssid)" = "$PRIMARY_SSID" ]; then
          echo "Connected to primary SSID ($PRIMARY_SSID)."
          exit 0
        fi
        sleep "$RETRY_DELAY"
      done

      echo "Primary unreachable; starting fallback AP ($FALLBACK_CONN)..."
      nmcli con up id "$FALLBACK_CONN"

- name: Create systemd service for boot-time WiFi fallback check
  when: "'access_point' in group_names"
  copy:
    dest: /etc/systemd/system/wifi-fallback.service
    mode: '0644'
    content: |
      [Unit]
      Description=Try primary WiFi at boot; host the fallback AP if it's unavailable
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/check_wifi_fallback.sh

      [Install]
      WantedBy=multi-user.target

- name: Enable and start wifi-fallback service
  when: "'access_point' in group_names"
  systemd:
    name: wifi-fallback.service
    enabled: true
    state: started
    daemon_reload: true

- name: Remove leftover wifi-fallback timer from the old periodic-retry design
  when: "'access_point' in group_names"
  block:
    - name: Stop and disable wifi-fallback.timer
      systemd:
        name: wifi-fallback.timer
        enabled: false
        state: stopped
      ignore_errors: true
    - name: Remove wifi-fallback.timer unit file
      file:
        path: /etc/systemd/system/wifi-fallback.timer
        state: absent
