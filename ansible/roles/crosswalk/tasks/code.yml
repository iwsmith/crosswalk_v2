---
- name: Download uv binary for aarch64 (64-bit Raspberry Pi OS)
  become: yes
  get_url:
    url: https://github.com/astral-sh/uv/releases/latest/download/uv-aarch64-unknown-linux-gnu.tar.gz
    dest: /tmp/uv.tar.gz

- name: Extract uv binary
  become: yes
  unarchive:
    src: /tmp/uv.tar.gz
    dest: /usr/local/bin/
    remote_src: yes
    extra_opts: [--strip-components=1]

- name: Ensure uv is executable
  become: yes
  file:
    path: /usr/local/bin/uv
    mode: '0755'
    state: file

- name: Check uv version
  command: uv --version
  register: uv_version
  changed_when: false

- name: Display uv version
  debug:
    var: uv_version.stdout

- name: Ensure /opt/crosswalk is owned by crosswalk
  become: yes
  file:
    path: /opt/crosswalk
    state: directory
    owner: crosswalk
    group: crosswalk
    mode: '0755'
    
- name: Clone crosswalk from GitHub
  become: yes
  become_user: crosswalk
  git:
    repo: https://github.com/iwsmith/crosswalk_v2.git
    dest: /opt/crosswalk
    version: main
    update: yes
  register: crosswalk_repo

- name: Fetch git-LFS assets (gifs, audio)
  become: yes
  become_user: crosswalk
  command: git lfs pull
  args:
    chdir: /opt/crosswalk
  # The git module clone/pull does NOT fetch LFS objects, so without this the box
  # ends up with pointer files that break stream generation and audio playback.
  # Some assets may be missing on the LFS server; don't abort the whole deploy
  # over a 404 — everything else still gets fetched.
  register: lfs_pull
  failed_when: false
  changed_when: false

- name: Install crosswalk dependencies with uv sync
  become: yes
  become_user: crosswalk  
  command: uv sync --no-dev --frozen
  args:
    chdir: /opt/crosswalk

- name: Clone rpi-rgb-led-matrix from GitHub
  git:
    repo: https://github.com/hzeller/rpi-rgb-led-matrix.git 
    dest: /opt/rpi-rgb-led-matrix
    version: master  # or a branch name, tag, or commit hash
    update: yes

- name: Build led-image-viewer
  make:
    chdir: /opt/rpi-rgb-led-matrix/utils

- name: Copy led-image-viewer to /usr/local/bin with setuid
  become: yes
  copy:
    src: /opt/rpi-rgb-led-matrix/utils/led-image-viewer
    dest: /usr/local/bin/led-image-viewer
    mode: '4755'
    remote_src: yes

- name: Ensure /opt/crosswalk_stream is owned by crosswalk
  become: yes
  file:
    path: /opt/crosswalk_stream
    state: directory
    owner: crosswalk
    group: crosswalk
    mode: '0755'

- name: Check for existing streams
  ansible.builtin.find:
    paths: /opt/crosswalk_stream
    patterns: "*.stream"
    recurse: yes
  register: existing_streams
  changed_when: false

- name: Make streams from gifs
  ansible.builtin.shell: /opt/crosswalk/bin/make_stream.sh /opt/crosswalk/static/data/ /opt/crosswalk_stream/ {{crosswalk_led_angle}}
  # Only rebuild when the repo actually changed (new/updated gifs) or when no
  # streams exist yet — otherwise this reruns and reports "changed" every play.
  when: crosswalk_repo is changed or existing_streams.matched == 0

- name: Install xwalk service files
  become: yes
  template:
    src: "{{ item }}.service"
    dest: "/etc/systemd/system/{{ item }}.service"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ crosswalk_services }}"

- name: Reload systemd to register new service
  become: yes
  command: systemctl daemon-reload

- name: Start xwalk_controller service
  become: yes
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop: "{{ crosswalk_services }}"

# xwalk_button_switch sometimes never registers gpiozero's edge-detection
# callback when it starts too early in boot (silent - no error/warning
# logged), leaving physical button presses undetected until the service is
# restarted by hand. Root cause is a live-hardware GPIO timing question, not
# something fixable from here; this is a known-good mitigation: restart it
# once, shortly after boot, once the system has settled.
- name: Create xwalk_button_switch warmup-restart service
  become: yes
  when: "'xwalk_button_switch' in crosswalk_services"
  copy:
    dest: /etc/systemd/system/xwalk-button-switch-warmup.service
    mode: '0644'
    content: |
      [Unit]
      Description=One-time delayed restart of xwalk_button_switch to clear a cold-boot GPIO race
      After=xwalk_button_switch.service
      Requires=xwalk_button_switch.service

      [Service]
      Type=oneshot
      ExecStart=/bin/systemctl restart xwalk_button_switch.service

- name: Create xwalk_button_switch warmup-restart timer
  become: yes
  when: "'xwalk_button_switch' in crosswalk_services"
  copy:
    dest: /etc/systemd/system/xwalk-button-switch-warmup.timer
    mode: '0644'
    content: |
      [Unit]
      Description=Restart xwalk_button_switch shortly after boot to clear a cold-boot GPIO race

      [Timer]
      OnBootSec=45s
      Unit=xwalk-button-switch-warmup.service

      [Install]
      WantedBy=timers.target

- name: Reload systemd to register warmup-restart units
  become: yes
  when: "'xwalk_button_switch' in crosswalk_services"
  command: systemctl daemon-reload

- name: Enable and start xwalk_button_switch warmup-restart timer
  become: yes
  when: "'xwalk_button_switch' in crosswalk_services"
  systemd:
    name: xwalk-button-switch-warmup.timer
    enabled: true
    state: started


